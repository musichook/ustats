<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ustats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="wrapper">
    <div id="app">
      <div class="scanlines"></div>
      <div class="content">
        <div id="no-key-msg" class="row" style="display:none;">
          <span class="dim">No auth — claude /login</span>
        </div>

        <div id="loading-msg" class="row" style="display:none;">
          <span class="dim">Loading...</span>
        </div>

        <div id="usage-display" class="row" style="display:none;">
          <span id="star" class="star">✶</span>
          <span id="bucket-session" class="bucket">
            <span class="label">SESSION</span>
            <span class="bar" id="bar-session"></span>
            <span class="pct" id="pct-session"></span>
          </span>
          <span class="sep">·</span>
          <span id="bucket-weekly-all" class="bucket">
            <span class="label">WEEK</span>
            <span class="bar-wrap">
              <span class="bar" id="bar-weekly-all"></span>
              <span class="bar-overlay" id="time-left"></span>
            </span>
            <span class="pct" id="pct-weekly-all"></span>
          </span>
          <span id="bucket-weekly-sonnet" class="bucket" style="display:none;">
            <span class="sep">·</span>
            <span class="label">SONNET</span>
            <span class="bar" id="bar-weekly-sonnet"></span>
            <span class="pct" id="pct-weekly-sonnet"></span>
          </span>
        </div>
      </div>
    </div>
    <button id="close-btn" class="close-btn">✕</button>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
